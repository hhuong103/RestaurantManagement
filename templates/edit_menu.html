<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* General body and layout */
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #d3dce6 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #2c3e50;
        }

        /* Form container */
        form {
            width: 100%;
            max-width: 650px;
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            animation: slideIn 0.5s ease-out;
            border: 1px solid #e9ecef;
        }

        /* Animation */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Form header */
        form h2 {
            margin-bottom: 35px;
            font-size: 2rem;
            font-weight: 600;
            color: #5e35b1;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* Input and label styling */
        label {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: #34495e;
            display: block;
            transition: color 0.3s ease;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 25px;
            font-size: 1rem;
            border-radius: 12px;
            border: 2px solid #dfe6e9;
            background: #f9fbfc;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        input[type="file"]:focus {
            border-color: #5e35b1;
            box-shadow: 0 0 12px rgba(94, 53, 177, 0.2);
            background: #fff;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 130px;
        }

        /* File input button styling */
        input[type="file"]::-webkit-file-upload-button {
            background: #5e35b1;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        input[type="file"]::-webkit-file-upload-button:hover {
            background: #4527a0;
        }

        /* AI Helper Styles */
        .ai-helper-section {
            background: linear-gradient(135deg, rgba(94, 53, 177, 0.1), rgba(142, 36, 170, 0.05));
            border: 2px solid #5e35b1;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .ai-helper-title {
            color: #4527a0;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
        }

        .ai-helper-title i {
            color: #e74c3c;
        }

        .ai-helper-section p {
            color: #555;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input,
        .input-group button {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            font-size: 1rem;
        }

        .input-group button {
            background: #5e35b1;
            color: white;
            cursor: pointer;
            border: none;
            transition: background 0.3s ease;
        }

        .input-group button:hover {
            background: #4527a0;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 20px;
            color: #5e35b1;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #5e35b1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .ai-status {
            font-size: 0.95rem;
            margin-top: 10px;
            color: #555;
        }

        .ai-result-alert {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .ai-result-alert.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }

        .ai-result-alert.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }

        .edit-hint {
            font-size: 0.85rem;
            color: #7f8c8d;
            font-style: italic;
            margin-top: -15px;
            margin-bottom: 15px;
        }

        /* Image preview */
        .image-preview {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-preview img {
            max-width: 250px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .image-preview img:hover {
            transform: scale(1.05);
        }

        /* Buttons container */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        /* Submit button */
        button[type="submit"] {
            flex: 1;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #fff;
            background: linear-gradient(45deg, #5e35b1, #8e24aa);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button[type="submit"]:hover {
            background: linear-gradient(45deg, #4527a0, #6d1b7b);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(94, 53, 177, 0.3);
        }

        /* Cancel button */
        .cancel-button {
            flex: 1;
            padding: 14px;
            font-size: 1.1rem;
            text-align: center;
            color: #5e35b1;
            background: #f1f3f5;
            border: 2px solid #5e35b1;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cancel-button:hover {
            background: #e9ecef;
            color: #4527a0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(94, 53, 177, 0.2);
        }

        /* Success and error messages */
        .error, .success {
            margin-bottom: 25px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid transparent;
            animation: fadeIn 0.3s ease-in;
        }

        .error {
            background: #ffebee;
            color: #c0392b;
            border-color: #ffcdd2;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            border-color: #c8e6c9;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            form {
                padding: 25px;
            }

            button[type="submit"], .cancel-button {
                font-size: 1rem;
                padding: 12px;
            }

            .image-preview img {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <form method="POST" enctype="multipart/form-data" action="{{ url_for('edit_menu', item_id=item.id) }}">
        <h2>Edit Menu Item</h2>

        {% if success_message %}
        <div class="success">{{ success_message }}</div>
        {% endif %}

        <!-- AI Helper Section -->
        <div class="ai-helper-section">
            <div class="ai-helper-title">
                <i class="fas fa-magic"></i> AI Dish Assistant
            </div>
            <p>Upload a new dish image to update the name and description with AI assistance.</p>
            
            <div class="input-group">
                <input type="file" id="aiImageInput" accept="image/*" placeholder="Upload new image for AI analysis">
                <button type="button" id="aiAnalyzeBtn">
                    <i class="fas fa-wand-magic-sparkles"></i> Analyze
                </button>
            </div>

            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
                <div class="ai-status">Analyzing image...</div>
            </div>

            <div class="ai-result-alert" id="aiResultAlert"></div>
        </div>

        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ item.name }}" placeholder="Enter menu name" required>
        <div class="edit-hint">Update with AI or edit manually</div>

        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Enter menu description" required>{{ item.description }}</textarea>
        <div class="edit-hint">Update with AI or edit manually</div>

        <label for="price">Price</label>
        <input type="number" id="price" name="price" value="{{ item.price }}" step="0.01" placeholder="Enter menu price" required>

        <label for="rating">Rating (1-5)</label>
        <input type="number" id="rating" name="rating" value="{{ item.rating }}" step="0.1" min="1" max="5" placeholder="Enter rating" required>

        <label class="form-label">Category</label>
        <input type="text" name="category" placeholder="e.g.: Drinks, Dessert, Main Course"
               value="{{ item.category if item else '' }}">

        <!-- Image Upload -->
        <div>
            <label for="image">Menu Image</label>
            <input type="file" name="image" id="image" accept="image/*">
            {% if item.image %}
            <div class="image-preview">
                <img src="{{ url_for('static', filename='uploads/' + item.image) }}" alt="Current Menu Image">
            </div>
            {% endif %}
        </div>

        <!-- Button Group with Swapped Positions -->
        <div class="button-group">
            <!-- Cancel button now on the left -->
            <a href="{{ url_for('show_menu_list') }}" class="cancel-button">Cancel</a>
            <!-- Save Changes button now on the right -->
            <button type="submit">Save Changes</button>
        </div>
    </form>

    <script>
        document.getElementById('aiAnalyzeBtn').addEventListener('click', async function() {
            const aiImageInput = document.getElementById('aiImageInput');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const aiResultAlert = document.getElementById('aiResultAlert');

            if (!aiImageInput.files || aiImageInput.files.length === 0) {
                aiResultAlert.textContent = 'Please select an image first';
                aiResultAlert.className = 'ai-result-alert error';
                return;
            }

            // Show loading
            loadingSpinner.style.display = 'block';
            aiResultAlert.className = 'ai-result-alert';

            const formData = new FormData();
            formData.append('image', aiImageInput.files[0]);

            try {
                const response = await fetch('/api/analyze_food_image', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    // Fill form with AI results
                    document.getElementById('name').value = data.name || '';
                    document.getElementById('description').value = data.description || '';

                    aiResultAlert.innerHTML = `
                        <strong><i class="fas fa-check-circle"></i> Success!</strong><br>
                        <strong>Name:</strong> ${data.name}<br>
                        <strong>Description:</strong> ${data.description.substring(0, 100)}...
                    `;
                    aiResultAlert.className = 'ai-result-alert success';
                } else {
                    aiResultAlert.textContent = `Error: ${data.error || 'Failed to analyze image'}`;
                    aiResultAlert.className = 'ai-result-alert error';
                }
            } catch (error) {
                aiResultAlert.textContent = `Error: ${error.message}`;
                aiResultAlert.className = 'ai-result-alert error';
            } finally {
                loadingSpinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
