{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body text-center">
                    <h1 class="card-title">Welcome to My Restaurant</h1>
                    {% if username %}
                        <p class="card-text">Hello, {{ username }}! You are logged in as {{ role }}.</p>
                        <a href="{{ url_for('show_menu') }}" class="btn btn-primary">View Menu</a>
                    {% else %}
                        <p class="card-text">Please login to access more features.</p>
                        <a href="{{ url_for('login') }}" class="btn btn-primary">Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
