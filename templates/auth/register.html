<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.css') }}">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Reset và thiết lập nền */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: url("{{ url_for('static', filename='bb.jpg') }}") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
    }

    /* Container chính */
    .register-container {
      max-width: 450px;
      width: 100%;
      margin: 40px auto;
      background: #ffffff;
      padding: 40px 35px;
      border-radius: 20px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .register-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
    }

    /* Tiêu đề */
    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .form-icon {
      width: 3.5rem;
      height: 3.5rem;
      color: #007bff;
      margin-bottom: 15px;
      transition: transform 0.3s ease;
    }

    .register-header:hover .form-icon {
      transform: scale(1.1);
    }

    .register-header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a1a1a;
      margin: 0;
    }

    /* Form styling */
    .form-label {
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    .input-group {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    .input-group-text {
      background: #f0f4f8;
      border: none;
      color: #007bff;
      padding: 12px;
    }

    .form-control, .form-select {
      border: none;
      padding: 12px;
      font-size: 1rem;
      background: #f9fbfd;
      border-radius: 0 12px 12px 0;
      transition: all 0.3s ease;
    }

    .form-control:focus, .form-select:focus {
      background: #fff;
      box-shadow: inset 0 0 5px rgba(0, 123, 255, 0.3);
      color: #1a1a1a;
    }

    /* Nút đăng ký */
    .btn-primary {
      background: linear-gradient(135deg, #007bff, #0056b3);
      border: none;
      padding: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #0056b3, #003d80);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
    }

    .btn-primary i {
      margin-right: 8px;
    }

    /* Liên kết đăng nhập */
    .login-link {
      margin-top: 25px;
      font-size: 0.95rem;
      color: #555;
    }

    .login-link a {
      color: #007bff;
      font-weight: 600;
      text-decoration: none;
      position: relative;
    }

    .login-link a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #007bff;
      transition: width 0.3s ease;
    }

    .login-link a:hover::after {
      width: 100%;
    }

    .login-link a:hover {
      color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Container chính -->
  <div class="register-container">
    <!-- Tiêu đề -->
    <div class="register-header">
      <i class="bi bi-person-plus-fill form-icon"></i>
      <h1>Register</h1>
    </div>

    <!-- Form đăng ký -->
    <form method="POST" action="{{ url_for('register') }}" class="mt-4">
      <!-- Trường Username -->
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-person"></i>
          </span>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="Enter your username"
            required
            aria-label="Username"
          >
        </div>
      </div>

      <!-- Trường Password -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-lock-fill"></i>
          </span>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
            aria-label="Password"
          >
        </div>
      </div>

      <!-- Trường Role -->
      <div class="mb-4">
        <label for="role" class="form-label">Role</label>
        <select
          class="form-select"
          id="role"
          name="role"
          required
          aria-label="Role"
        >
          <option value="customer">Customer</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <!-- Nút Submit -->
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-person-check"></i> Register
      </button>
    </form>

    <!-- Liên kết đến trang đăng nhập -->
    <p class="login-link text-center">
      Already have an account?
      <a href="{{ url_for('login') }}">Login here</a>.
    </p>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.js') }}"></script>
</body>
</html>
