<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | {% if order %}Edit{% else %}Create{% endif %} Order</title>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f5f7fa 100%);
            min-height: 100vh;
            display: flex;
        }
        /* Vertical Navbar */
        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #1a252f 0%, #2c3e50 100%);
            color: white;
            padding: 20px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 3px 0 15px rgba(0, 0, 0, 0.3);
            transition: width 0.3s ease;
        }
        .sidebar .nav-brand {
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            display: block;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .sidebar .nav-brand:hover {
            color: #2ecc71;
        }
        .sidebar .nav-menu {
            flex-grow: 1;
        }
        .sidebar .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        .sidebar .nav-link:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateX(5px);
        }
        .sidebar .nav-link.active {
            background: #007bff;
            color: white;
            box-shadow: 0 2px 10px rgba(0, 123, 255, 0.3);
        }
        .sidebar .user-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .sidebar .user-info span {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #2ecc71;
        }
        .sidebar .logout-btn {
            color: #dc3545;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.3s ease;
        }
        .sidebar .logout-btn:hover {
            background: rgba(220, 53, 69, 0.3);
        }
        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 30px;
            flex-grow: 1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-header {
            background: linear-gradient(45deg, #007bff, #00c4ff);
            padding: 25px;
            border-bottom: none;
            text-align: center;
        }
        .card-header h3 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .card-body {
            background: #f9fbfd;
            padding: 35px;
            border-radius: 0 0 20px 20px;
        }
        .form-floating {
            margin-bottom: 25px;
            position: relative;
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #d1d9e6;
            padding: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fff;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        .form-control:focus, .form-select:focus {
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
            background: #fff;
        }
        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }
        label {
            color: #6c757d;
            font-weight: 500;
            padding-left: 12px;
        }
        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-success {
            background: linear-gradient(45deg, #28a745, #34c759);
            color: white;
            border: none;
        }
        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
            background: linear-gradient(45deg, #34c759, #28a745);
        }
        .btn-secondary {
            background: linear-gradient(45deg, #6c757d, #adb5bd);
            color: white;
            border: none;
        }
        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(108, 117, 125, 0.4);
            background: linear-gradient(45deg, #adb5bd, #6c757d);
        }
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            .main-content {
                margin-left: 200px;
                padding: 20px;
            }
            .container {
                padding: 10px;
            }
            .card-body {
                padding: 20px;
            }
            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Main Content -->
    <div class="main-content">
        <div class="container mt-5">
            <!-- Header Section -->
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <div class="card shadow-sm border-0">
                        <!-- Card Header -->
                        <div class="card-header text-white text-center">
                            <h3>{% if order %}Edit{% else %}Create{% endif %} Order</h3>
                        </div>
                        
                        <!-- Card Body -->
                        <div class="card-body p-4">
                            <form method="POST" action="{% if order %}{{ url_for('update_order', order_id=order.id) }}{% else %}{{ url_for('store_order') }}{% endif %}">
                                <!-- Customer Name -->
                                <div class="form-floating mb-3">
                                    <input 
                                        type="text" 
                                        class="form-control shadow-sm" 
                                        id="customer_name" 
                                        name="customer_name" 
                                        placeholder="Customer Name" 
                                        value="{{ order.customer_name if order else '' }}" 
                                        required>
                                    <label for="customer_name">Customer Name</label>
                                </div>
                                
                                <!-- Items -->
                                <div class="form-floating mb-3">
                                    <textarea 
                                        class="form-control shadow-sm" 
                                        id="items" 
                                        name="items" 
                                        placeholder="Items" 
                                        rows="3" 
                                        required>{{ order['items'] if order else '' }}</textarea>
                                    <label for="items">Items</label>
                                </div>
                                  
                                <!-- Quantity -->
                                <div class="form-floating mb-3">
                                    <input 
                                        type="number" 
                                        class="form-control shadow-sm" 
                                        id="quantity" 
                                        name="quantity" 
                                        placeholder="Quantity" 
                                        value="{{ order.quantity if order else '' }}" 
                                        required>
                                    <label for="quantity">Quantity</label>
                                </div>
                                 
                                <!-- Price -->
                                <div class="form-floating mb-3">
                                    <input 
                                        type="number" 
                                        class="form-control shadow-sm" 
                                        id="price" 
                                        name="price" 
                                        placeholder="Price" 
                                        step="0.01" 
                                        value="{{ order.price if order else '' }}" 
                                        required>
                                    <label for="price">Price</label>
                                </div>

                                <!-- Status -->
                                <div class="form-floating mb-3">
                                    <select 
                                        class="form-select shadow-sm" 
                                        id="status" 
                                        name="status" 
                                        required>
                                        <option value="" disabled {% if not order %}selected{% endif %}>Select Status</option>
                                        <option value="Pending" {% if order and order.status == 'Pending' %}selected{% endif %}>Pending</option>
                                        <option value="Completed" {% if order and order.status == 'Completed' %}selected{% endif %}>Completed</option>
                                        <option value="Cancelled" {% if order and order.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                                    </select>
                                    <label for="status">Status</label>
                                </div>

                                <!-- Note -->
                                <div class="form-floating mb-4">
                                    <textarea 
                                        class="form-control shadow-sm" 
                                        id="note" 
                                        name="note" 
                                        placeholder="Add a note" 
                                        rows="2">{{ order.note if order else '' }}</textarea>
                                    <label for="note">Note</label>
                                </div>
                                
                                <!-- Buttons -->
                                <div class="d-flex justify-content-between">
                                    <a href="{{ url_for('list_orders') }}" class="btn btn-secondary shadow-sm px-4">
                                        <i class="bi bi-arrow-left"></i> Cancel
                                    </a>
                                    <button type="submit" class="btn btn-success shadow-sm px-4">
                                        <i class="bi bi-save"></i> {% if order %}Update{% else %}Create{% endif %}
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
