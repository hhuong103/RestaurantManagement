<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Menu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px 0;
    }

    .container {
      background: #ffffff;
      border-radius: 15px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.2rem;
      color: #2c3e50;
      text-align: center;
      margin-bottom: 40px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .form-label {
      font-size: 1rem;
      color: #34495e;
      font-weight: 500;
      margin-bottom: 8px;
      transition: color 0.3s ease;
    }

    .form-control, .form-control:focus {
      border-radius: 10px;
      border: 2px solid #e0e6ed;
      padding: 12px 15px;
      transition: all 0.3s ease;
      background: #f8fafc;
    }

    .form-control:focus {
      border-color: #3498db;
      box-shadow: 0 0 10px rgba(52, 152, 219, 0.2);
      background: #fff;
    }

    textarea.form-control {
      min-height: 100px;
      resize: vertical;
    }

    .btn-primary {
      background: linear-gradient(45deg, #3498db, #2980b9);
      border: none;
      padding: 12px;
      font-size: 1.1rem;
      border-radius: 10px;
      width: 100%;
      font-weight: 500;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary:hover {
      background: linear-gradient(45deg, #2980b9, #2471a3);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
    }

    .btn-secondary {
      background: linear-gradient(45deg, #7f8c8d, #6c757d);
      border: none;
      padding: 12px;
      font-size: 1.1rem;
      border-radius: 10px;
      width: 100%;
      font-weight: 500;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-secondary:hover {
      background: linear-gradient(45deg, #6c757d, #5a6268);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
    }

    .mb-3 {
      margin-bottom: 25px;
    }

    .btn-container {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    /* File input styling */
    .form-control[type="file"] {
      padding: 8px 15px;
      cursor: pointer;
    }

    .form-control[type="file"]::-webkit-file-upload-button {
      background: #3498db;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .form-control[type="file"]::-webkit-file-upload-button:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1>Create a New Menu Item</h1>

    <form action="{{ url_for('store_menu') }}" method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label for="name" class="form-label">Menu Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
      </div>

      <div class="mb-3">
        <label for="price" class="form-label">Price</label>
        <input type="number" step="0.01" class="form-control" id="price" name="price" required>
      </div>

      <div class="mb-3">
        <label for="rating" class="form-label">Rating (1-5)</label>
        <input type="number" step="0.1" min="1" max="5" class="form-control" id="rating" name="rating" value="5.0" required>
      </div>

      <div class="mb-3">
  <label class="form-label">Category</label>
  <input class="form-control" name="category" placeholder="Ví dụ: Drinks, Dessert, Main Course"
         value="{{ item.category if item else '' }}">
</div>


      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description"></textarea>
      </div>

      <div class="mb-3">
        <label for="image" class="form-label">Menu Image</label>
        <input type="file" class="form-control" id="image" name="image">
      </div>

      <div class="btn-container">
        <a href="{{ url_for('show_menu_list') }}" class="btn btn-secondary">Back</a>
        <button type="submit" class="btn btn-primary">Save Menu</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
