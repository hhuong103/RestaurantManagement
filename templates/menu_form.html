<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Menu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px 0;
    }

    .container {
      background: #ffffff;
      border-radius: 15px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 2.2rem;
      color: #2c3e50;
      text-align: center;
      margin-bottom: 40px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .form-label {
      font-size: 1rem;
      color: #34495e;
      font-weight: 500;
      margin-bottom: 8px;
      transition: color 0.3s ease;
    }

    .form-control, .form-control:focus {
      border-radius: 10px;
      border: 2px solid #e0e6ed;
      padding: 12px 15px;
      transition: all 0.3s ease;
      background: #f8fafc;
    }

    .form-control:focus {
      border-color: #3498db;
      box-shadow: 0 0 10px rgba(52, 152, 219, 0.2);
      background: #fff;
    }

    textarea.form-control {
      min-height: 100px;
      resize: vertical;
    }

    .btn-primary {
      background: linear-gradient(45deg, #3498db, #2980b9);
      border: none;
      padding: 12px;
      font-size: 1.1rem;
      border-radius: 10px;
      width: 100%;
      font-weight: 500;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary:hover {
      background: linear-gradient(45deg, #2980b9, #2471a3);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
    }

    .btn-secondary {
      background: linear-gradient(45deg, #7f8c8d, #6c757d);
      border: none;
      padding: 12px;
      font-size: 1.1rem;
      border-radius: 10px;
      width: 100%;
      font-weight: 500;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-secondary:hover {
      background: linear-gradient(45deg, #6c757d, #5a6268);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
    }

    .mb-3 {
      margin-bottom: 25px;
    }

    .btn-container {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    /* File input styling */
    .form-control[type="file"] {
      padding: 8px 15px;
      cursor: pointer;
    }

    .form-control[type="file"]::-webkit-file-upload-button {
      background: #3498db;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .form-control[type="file"]::-webkit-file-upload-button:hover {
      background: #2980b9;
    }

    /* AI Helper Styles */
    .ai-helper-section {
      background: linear-gradient(135deg, rgba(52, 152, 219, 0.1), rgba(52, 152, 219, 0.05));
      border: 2px solid #3498db;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .ai-helper-title {
      color: #2980b9;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ai-helper-title i {
      color: #e74c3c;
    }

    .loading-spinner {
      display: none;
      text-align: center;
      padding: 20px;
      color: #3498db;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .ai-status {
      font-size: 0.95rem;
      margin-top: 10px;
      color: #555;
    }

    .ai-result-alert {
      display: none;
      margin-top: 15px;
      padding: 15px;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .ai-result-alert.success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
      display: block;
    }

    .ai-result-alert.error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
      display: block;
    }

    .edit-hint {
      font-size: 0.85rem;
      color: #7f8c8d;
      font-style: italic;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1>Create a New Menu Item</h1>

    <!-- AI Helper Section -->
    <div class="ai-helper-section">
      <div class="ai-helper-title">
        <i class="fas fa-magic"></i> AI Dish Assistant
      </div>
      <p style="color: #555; margin-bottom: 15px; font-size: 0.95rem;">
        Upload a dish image and the AI will automatically generate the name and description. You can edit them if needed.
      </p>
      
      <div class="input-group mb-3">
        <input type="file" class="form-control" id="aiImageInput" accept="image/*" placeholder="Upload image for AI analysis">
        <button class="btn btn-info" type="button" id="aiAnalyzeBtn">
          <i class="fas fa-wand-magic-sparkles"></i> Analyze Image
        </button>
      </div>

      <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <div class="ai-status">Analyzing image...</div>
      </div>

      <div class="ai-result-alert" id="aiResultAlert"></div>
    </div>

    <form action="{{ url_for('store_menu') }}" method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label for="name" class="form-label">Menu Name</label>
        <input type="text" class="form-control" id="name" name="name" required placeholder="e.g., Grilled Salmon">
        <div class="edit-hint">Automatically filled by AI, but you can edit it</div>
      </div>

      <div class="mb-3">
        <label for="price" class="form-label">Price</label>
        <input type="number" step="0.01" class="form-control" id="price" name="price" required>
      </div>

      <div class="mb-3">
        <label for="rating" class="form-label">Rating (1-5)</label>
        <input type="number" step="0.1" min="1" max="5" class="form-control" id="rating" name="rating" value="5.0" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <input class="form-control" name="category" placeholder="e.g.: Drinks, Dessert, Main Course"
               value="{{ item.category if item else '' }}">
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" placeholder="Detailed description of the dish..."></textarea>
        <div class="edit-hint">Automatically filled by AI, but you can edit it</div>
      </div>

      <div class="mb-3">
        <label for="image" class="form-label">Menu Image</label>
        <input type="file" class="form-control" id="image" name="image" accept="image/*">
      </div>

      <div class="btn-container">
        <a href="{{ url_for('show_menu_list') }}" class="btn btn-secondary">Back</a>
        <button type="submit" class="btn btn-primary">Save Menu</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

  <script>
    document.getElementById('aiAnalyzeBtn').addEventListener('click', async function() {
      const aiImageInput = document.getElementById('aiImageInput');
      const loadingSpinner = document.getElementById('loadingSpinner');
      const aiResultAlert = document.getElementById('aiResultAlert');

      if (!aiImageInput.files || aiImageInput.files.length === 0) {
        aiResultAlert.textContent = 'Please select an image first';
        aiResultAlert.className = 'ai-result-alert error';
        return;
      }

      // Show loading
      loadingSpinner.style.display = 'block';
      aiResultAlert.className = 'ai-result-alert';

      const formData = new FormData();
      formData.append('image', aiImageInput.files[0]);

      try {
        const response = await fetch('/api/analyze_food_image', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (data.success) {
          // Fill form with AI results (even when the result is a placeholder)
          document.getElementById('name').value = data.name || '';
          document.getElementById('description').value = data.description || '';

          // detect if the response is actually a fallback warning
          const isFallback = (data.name && data.name.includes('[AI unavailable]')) ||
                             (data.description && data.description.includes('AI unavailable'));

          if (isFallback) {
            aiResultAlert.innerHTML = `
              <strong><i class="fas fa-exclamation-triangle"></i> Notice</strong><br>
              ${data.description}
            `;
            aiResultAlert.className = 'ai-result-alert error';
          } else {
            aiResultAlert.innerHTML = `
              <strong><i class="fas fa-check-circle"></i> Success!</strong><br>
              <strong>Name:</strong> ${data.name}<br>
              <strong>Description:</strong> ${data.description.substring(0, 100)}...
            `;
            aiResultAlert.className = 'ai-result-alert success';
          }
        } else {
          aiResultAlert.textContent = `Error: ${data.error || 'Failed to analyze image'}`;
          aiResultAlert.className = 'ai-result-alert error';
        }
      } catch (error) {
        aiResultAlert.textContent = `Error: ${error.message}`;
        aiResultAlert.className = 'ai-result-alert error';
      } finally {
        loadingSpinner.style.display = 'none';
      }
    });

    // Allow Enter key to trigger analysis
    document.getElementById('aiImageInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('aiAnalyzeBtn').click();
      }
    });
  </script>
</body>
</html>
