<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f5f7fa 100%);
            display: flex;
            transition: all 0.3s ease;
        }
        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #1a252f 0%, #2c3e50 100%);
            color: white;
            padding: 20px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 3px 0 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        .sidebar.hidden {
            transform: translateX(-250px);
        }
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
        }
        .sidebar .user-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .sidebar .user-info span {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #2ecc71;
        }
        .sidebar .logout-btn {
            color: #dc3545;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.3s ease;
        }
        .sidebar .logout-btn:hover {
            background: rgba(220, 53, 69, 0.2);
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
            flex-grow: 1;
            transition: all 0.3s ease;
        }
        .main-content.expanded {
            margin-left: 0;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
        }
        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }
        .toggle-btn {
            position: fixed;
            top: 1px;
            left: 300px;
            z-index: 1000;
            background: #2c3e50;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: left 0.3s ease;
        }
        .toggle-btn.hidden {
            left: 10px;
        }
        /* Stats Cards */
        .stats-container {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stats-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            min-width: 200px;
        }
        .stats-icon {
            width: 50px;
            height: 50px;
            background: var(--icon-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stats-icon i {
            font-size: 1.5rem;
            color: var(--icon-color);
        }
        .stats-info h4 {
            font-size: 0.9rem;
            color: #666;
            margin: 0;
            text-transform: uppercase;
        }
        .stats-info p {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            margin: 0;
        }
        .stats-info p span {
            font-size: 1rem;
            color: #999;
            font-weight: 400;
        }
        .revenue-card {
            --icon-bg: #e8f5e9;
            --icon-color: #28a745;
        }
        .orders-card {
            --icon-bg: #e3f2fd;
            --icon-color: #007bff;
        }
        .customers-card {
            --icon-bg: #fff3e0;
            --icon-color: #f57c00;
        }
    </style>
</head>
<body>
    <!-- Toggle Button -->
    <button class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-list"></i> Menu
    </button>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="nav-menu">
            <a href="/" class="nav-link"><i class="bi bi-house-door"></i> Home</a>
            <a href="/cart" class="nav-link"><i class="bi bi-cart"></i> Cart</a>
            <a href="{{ url_for('show_menu_list') }}" class="nav-link"><i class="bi bi-list"></i> Menu</a>
            <a href="{{ url_for('list_orders') }}" class="nav-link"><i class="bi bi-receipt"></i> Orders</a>
            <a href="{{ url_for('user_list') }}" class="nav-link"><i class="bi bi-people"></i> Users</a>
            <a href="{{ url_for('dashboard') }}" class="nav-link active"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <div class="user-info">
                <span><i class="bi bi-person-circle"></i> {{ username }}</span>
                <a href="/logout" class="logout-btn"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            <h1>📈 Dashboard</h1>

            <!-- Stats Section -->
            <div class="stats-container">
                <div class="stats-card orders-card">
                    <div class="stats-icon">
                        <i class="bi bi-cart"></i>
                    </div>
                    <div class="stats-info">
                        <h4>Total invoice</h4>
                        <p>{{ order_count }} <span>%</span></p>
                    </div>
                </div>
                <div class="stats-card revenue-card">
                    <div class="stats-icon">
                        <i class="bi bi-currency-dollar"></i>
                    </div>
                    <div class="stats-info">
                        <h4>Monthly Revenue</h4>
                        <p>{{ total_revenue | format_price }} <span></span></p>
                    </div>
                </div>
                <div class="stats-card customers-card">
                    <div class="stats-icon">
                        <i class="bi bi-people"></i>
                    </div>
                    <div class="stats-info">
                        <h4>Total Customer</h4>
                        <p>{{ user_count }} <span>%</span></p>
                    </div>
                </div>
            </div>

            <!-- Monthly Chart -->
            <div class="card">
                <h3>Total Revenue & Customers Over Time (Monthly)</h3>
                <div class="chart-container">
                    <canvas id="combinedChart"></canvas>
                </div>
            </div>

            <!-- Daily Revenue Chart -->
            <div class="card">
                <h3>Daily Revenue for April 2025</h3>
                <div class="chart-container">
                    <canvas id="dailyRevenueChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const mainContent = document.querySelector('.main-content');
            const toggleBtn = document.querySelector('.toggle-btn');
            
            sidebar.classList.toggle('hidden');
            mainContent.classList.toggle('expanded');
            toggleBtn.classList.toggle('hidden');
        }

        // Monthly Chart (Existing)
        const combinedData = {
            labels: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
            datasets: [
                {
                    label: 'Total Revenue (VND)',
                    data: {{ monthly_revenue_data | tojson }},
                    borderColor: 'rgba(255, 99, 132, 1)',
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderWidth: 3,
                    fill: false,
                    tension: 0.4,
                    yAxisID: 'y',
                },
                {
                    label: 'Customers Count',
                    data: {{ customer_counts | tojson }},
                    borderColor: 'rgba(54, 162, 235, 1)',
                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                    borderWidth: 3,
                    fill: false,
                    tension: 0.4,
                    yAxisID: 'y1',
                }
            ]
        };

        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'top',
                },
            },
            scales: {
                x: {
                    title: {
                        display: true,
                        text: 'Month',
                    }
                },
                y: {
                    type: 'linear',
                    position: 'left',
                    title: {
                        display: true,
                        text: 'Revenue (VND)',
                    }
                },
                y1: {
                    type: 'linear',
                    position: 'right',
                    title: {
                        display: true,
                        text: 'Customers Count',
                    },
                    grid: {
                        drawOnChartArea: false,
                    }
                }
            }
        };

        const combinedChart = new Chart(document.getElementById('combinedChart'), {
            type: 'line',
            data: combinedData,
            options: chartOptions
        });

        // Daily Revenue Chart (New)
        const dailyRevenueData = {
            labels: Array.from({ length: 31 }, (_, i) => (i + 1).toString()), // Days 1 to 31
            datasets: [
                {
                    label: 'Daily Revenue (VND)',
                    data: {{ daily_revenue_data | tojson }},
                    borderColor: 'rgba(75, 192, 192, 1)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderWidth: 3,
                    fill: false,
                    tension: 0.4,
                }
            ]
        };

        const dailyChartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'top',
                },
            },
            scales: {
                x: {
                    title: {
                        display: true,
                        text: 'Day of Month',
                    }
                },
                y: {
                    title: {
                        display: true,
                        text: 'Revenue (VND)',
                    },
                    beginAtZero: true
                }
            }
        };

        const dailyRevenueChart = new Chart(document.getElementById('dailyRevenueChart'), {
            type: 'line',
            data: dailyRevenueData,
            options: dailyChartOptions
        });
    </script>
</body>
</html>
