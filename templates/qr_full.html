<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>QR Full Size</title>
  <style>
    :root{
      --bg0:#fbfaf8; --bg1:#f3f5f4; --card:#fff;
      --text:#0f172a; --muted:#64748b; --border:rgba(15,23,42,.10);
      --shadow: 0 24px 60px -18px rgba(15,23,42,.20);
      --radius: 24px; --brand:#0e5c46;
    }
    html,body{height:100%;}
    body{
      margin:0; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:20px; box-sizing:border-box;
      background:
        radial-gradient(1200px 600px at 15% 10%, rgba(14,92,70,.10), transparent 60%),
        radial-gradient(900px 520px at 85% 12%, rgba(245,158,11,.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: var(--text);
    }
    .card{
      width: min(92vmin, 860px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      position: relative;
    }
    .badge{
      position:absolute; top:-12px; left:50%;
      transform: translateX(-50%);
      background: rgba(14,92,70,.96);
      color:#fff;
      font-weight:900;
      font-size:.85rem;
      padding:6px 14px;
      border-radius:999px;
      letter-spacing:.6px;
    }
    .qr-wrap{
      background:#fff;
      border-radius: 18px;
      border: 1px solid rgba(15,23,42,.10);
      padding: 18px; /* tạo quiet-zone + tránh cảm giác “cắt viền” */
      display:flex;
      align-items:center;
      justify-content:center;
      overflow: visible;
    }
    img#qr{
      width: min(86vmin, 780px);
      height: auto;
      aspect-ratio: 1 / 1;
      display:block;
      background:#fff;
      border-radius: 10px;
      /* avoid smoothing when scaling large PNGs */
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    .meta{
      margin-top: 14px;
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-weight: 700;
      font-size: .92rem;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(14,92,70,.28);
      background:#fff;
      color: var(--brand);
      font-weight:900;
      padding:10px 14px;
      border-radius: 14px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .btn:hover{ background: rgba(14,92,70,.06); }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-weight: 900;
      letter-spacing: .2px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">SCAN ME</div>

    <div class="qr-wrap">
      <img id="qr" alt="QR Code" src="{{ svg_url }}?v={{ (range(1, 999999)|random) }}">
    </div>

    <div class="meta">
      <div>Token: <span class="mono">{{ token }}</span></div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a class="btn" href="{{ svg_url }}?v={{ (range(1, 999999)|random) }}" target="_blank" rel="noopener">Open SVG</a>
        <a class="btn" href="{{ png_url }}?v={{ (range(1, 999999)|random) }}" target="_blank" rel="noopener">Open PNG</a>
        <button class="btn" id="btn-copy">Copy Link</button>
      </div>
    </div>
  </div>

  <script>
    // Nếu SVG lỗi thì fallback sang PNG
    const img = document.getElementById("qr");
    img.addEventListener("error", () => {
      img.src = "{{ png_url }}" + ( "{{ png_url }}".includes("?") ? "&" : "?" ) + "v=" + Date.now();
    });

    document.getElementById("btn-copy").addEventListener("click", async () => {
      const url = window.location.href;
      try {
        await navigator.clipboard.writeText(url);
        alert("Copied!");
      } catch(e) {
        alert(url);
      }
    });
  </script>
</body>
</html>
