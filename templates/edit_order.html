<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | {% if order %}Edit{% else %}Create{% endif %} Order</title>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e9f0ff 0%, #f7fafc 100%);
            min-height: 100vh;
            display: flex;
            color: #2d3748;
        }

        /* Vertical Navbar */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1e2a38 0%, #334756 100%);
            color: #e2e8f0;
            padding: 25px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.2);
            transition: width 0.3s ease;
        }

        .sidebar .nav-brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            margin-bottom: 35px;
            text-align: center;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .sidebar .nav-brand:hover {
            color: #38b2ac;
        }

        .sidebar .nav-menu {
            flex-grow: 1;
        }

        .sidebar .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #cbd5e0;
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .sidebar .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: translateX(8px);
        }

        .sidebar .nav-link.active {
            background: #3182ce;
            color: #fff;
            box-shadow: 0 4px 15px rgba(49, 130, 206, 0.4);
        }

        .sidebar .user-info {
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .sidebar .user-info span {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #38b2ac;
        }

        .sidebar .logout-btn {
            color: #e53e3e;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .sidebar .logout-btn:hover {
            background: rgba(229, 62, 62, 0.3);
            color: #fff;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            flex-grow: 1;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: #fff;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            background: linear-gradient(45deg, #3182ce, #63b3ed);
            padding: 30px;
            border-bottom: none;
            text-align: center;
        }

        .card-header h3 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
            letter-spacing: 0.5px;
        }

        .card-body {
            background: #fbfdfe;
            padding: 40px;
            border-radius: 0 0 25px 25px;
        }

        .form-floating {
            margin-bottom: 30px;
            position: relative;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            padding: 14px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fff;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        .form-control:focus, .form-select:focus {
            border-color: #3182ce;
            box-shadow: 0 0 10px rgba(49, 130, 206, 0.3);
            background: #fff;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        label {
            color: #718096;
            font-weight: 500;
            padding-left: 16px;
            transition: color 0.3s ease;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-success {
            background: linear-gradient(45deg, #2f855a, #48bb78);
            color: #fff;
            border: none;
        }

        .btn-success:hover {
            background: linear-gradient(45deg, #48bb78, #2f855a);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(47, 133, 90, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #718096, #a0aec0);
            color: #fff;
            border: none;
        }

        .btn-secondary:hover {
            background: linear-gradient(45deg, #a0aec0, #718096);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(113, 128, 150, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 220px;
            }
            .main-content {
                margin-left: 220px;
                padding: 25px;
            }
            .container {
                padding: 15px;
            }
            .card-body {
                padding: 25px;
            }
            .btn {
                padding: 12px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Main Content -->
    <div class="main-content">
        <div class="container mt-5">
            <!-- Header Section -->
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <div class="card shadow-sm border-0">
                        <!-- Card Header -->
                        <div class="card-header text-white text-center">
                            <h3>{% if order %}Edit{% else %}Create{% endif %} Order</h3>
                        </div>
                        
                        <!-- Card Body -->
                        <div class="card-body p-4">
                            <form method="POST" action="{% if order %}{{ url_for('update_order', order_id=order.id) }}{% else %}{{ url_for('store_order') }}{% endif %}">
                                <!-- Customer Name -->
                                <div class="form-floating mb-3">
                                    <input 
                                        type="text" 
                                        class="form-control shadow-sm" 
                                        id="customer_name" 
                                        name="customer_name" 
                                        placeholder="Customer Name" 
                                        value="{{ order.customer_name if order else '' }}" 
                                        required>
                                    <label for="customer_name">Customer Name</label>
                                </div>
                                
                                <!-- Items -->
                                <div class="form-floating mb-3">
                                    <textarea 
                                        class="form-control shadow-sm" 
                                        id="items" 
                                        name="items" 
                                        placeholder="Items" 
                                        rows="3" 
                                        required>{{ order['items'] if order else '' }}</textarea>
                                    <label for="items">Items</label>
                                </div>
                                
                                <!-- Quantity -->
                                <div class="form-floating mb-3">
                                    <input 
                                        type="number" 
                                        class="form-control shadow-sm" 
                                        id="quantity" 
                                        name="quantity" 
                                        placeholder="Quantity" 
                                        value="{{ order.quantity if order else '' }}" 
                                        required>
                                    <label for="quantity">Quantity</label>
                                </div>
                                
                                <!-- Price -->
                                <div class="form-floating mb-3">
                                    <input 
                                        type="number" 
                                        class="form-control shadow-sm" 
                                        id="price" 
                                        name="price" 
                                        placeholder="Price" 
                                        step="0.01" 
                                        value="{{ order.price if order else '' }}" 
                                        required>
                                    <label for="price">Price</label>
                                </div>

                                <!-- Status -->
                                <div class="form-floating mb-3">
                                    <select 
                                        class="form-select shadow-sm" 
                                        id="status" 
                                        name="status" 
                                        required>
                                        <option value="" disabled {% if not order %}selected{% endif %}>Select Status</option>
                                        <option value="Pending" {% if order and order.status == 'Pending' %}selected{% endif %}>Pending</option>
                                        <option value="Completed" {% if order and order.status == 'Completed' %}selected{% endif %}>Completed</option>
                                        <option value="Cancelled" {% if order and order.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                                    </select>
                                    <label for="status">Status</label>
                                </div>

                                <!-- Note -->
                                <div class="form-floating mb-4">
                                    <textarea 
                                        class="form-control shadow-sm" 
                                        id="note" 
                                        name="note" 
                                        placeholder="Add a note" 
                                        rows="2">{{ order.note if order else '' }}</textarea>
                                    <label for="note">Note</label>
                                </div>
                                
                                <!-- Buttons (Swapped Positions) -->
                                <div class="d-flex justify-content-between">
                                    <a href="{{ url_for('list_orders') }}" class="btn btn-secondary shadow-sm px-4">
                                        <i class="bi bi-arrow-left"></i> Cancel
                                    </a>
                                    <button type="submit" class="btn btn-success shadow-sm px-4">
                                        <i class="bi bi-save"></i> {% if order %}Update{% else %}Create{% endif %}
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
